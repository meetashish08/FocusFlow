<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=./FocusFlow.html">
    <title>FocusFlow - Redirecting...</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
        }
        h1 { font-size: 3em; margin-bottom: 20px; }
        p { font-size: 1.2em; opacity: 0.9; }
        .loading {
            font-size: 2em;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 FocusFlow</h1>
        <div class="loading">Loading...</div>
        <p>Redirecting to your productivity companion...</p>
        <p style="margin-top: 30px; font-size: 0.9em;">
            If not redirected, <a href="./FocusFlow.html" style="color: #ffd93d; text-decoration: underline;">click here</a>
        </p>
    </div>
</body>
</html>
